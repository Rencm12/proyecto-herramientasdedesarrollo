name: GameHub CI
on:
  push:
    branches:
      - main
      - CalebAlv
      - consola
      - Carlos
      - panel-admin
      - Accesibilidad
      - Karol/juegos
      - login
      - Prueba
      - Hilmer
  pull_request:
    branches:
      - main
      - CalebAlv
      - consola
      - Carlos
      - panel-admin
      - Accesibilidad
      - Karol/juegos
      - login
      - Prueba
      - Hilmer
jobs:
  validate:
    name: Lint, Build and Tests
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check code
        run: npm run lint
      - name: Build project
        run: npm run build
      - name: Run tests if configured
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm test -- --watch=false
          else
            echo "No test script configured yet. Skipping tests."
          fi